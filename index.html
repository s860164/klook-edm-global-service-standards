<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Klook EDM - New Global Service Standard Policy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      text-align: center;
    }
    .header h1 {
      font-size: 16px;
      color: #333;
      margin-bottom: 12px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .tab {
      padding: 6px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: #666;
      transition: all 0.2s;
    }
    .tab:hover { border-color: #FF5722; color: #FF5722; }
    .tab.active {
      background: #FF5722;
      color: #fff;
      border-color: #FF5722;
    }
    .content {
      display: flex;
      justify-content: center;
      padding: 20px 0;
    }
    .edm-container {
      max-width: 600px;
      width: 100%;
      background: #fff;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }
    .edm-container img {
      width: 100%;
      height: auto;
      display: block;
    }
    .edm-panel { display: none; }
    .edm-panel.active { display: block; }
    .footer {
      text-align: center;
      padding: 20px;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Klook EDM - New Global Service Standard Policy</h1>
    <div class="tabs">
      <div class="tab active" data-lang="en">English</div>
      <div class="tab" data-lang="zh-tw">繁體中文</div>
      <div class="tab" data-lang="zh-cn">简体中文</div>
      <div class="tab" data-lang="ja">日本語</div>
      <div class="tab" data-lang="ko">한국어</div>
      <div class="tab" data-lang="vi">Tiếng Việt</div>
      <div class="tab" data-lang="th">ภาษาไทย</div>
    </div>
  </div>
  <div class="content">
    <div class="edm-container">
      <div class="edm-panel active" data-lang="en"><img src="en.png?v=20260320" alt="English" /></div>
      <div class="edm-panel" data-lang="zh-tw"><img src="zh-tw.png?v=20260320" alt="繁體中文" /></div>
      <div class="edm-panel" data-lang="zh-cn"><img src="zh-cn.png?v=20260320" alt="简体中文" /></div>
      <div class="edm-panel" data-lang="ja"><img src="ja.png?v=20260320" alt="日本語" /></div>
      <div class="edm-panel" data-lang="ko"><img src="ko.png?v=20260320" alt="한국어" /></div>
      <div class="edm-panel" data-lang="vi"><img src="vi.png?v=20260320" alt="Tiếng Việt" /></div>
      <div class="edm-panel" data-lang="th"><img src="th.png?v=20260320" alt="ภาษาไทย" /></div>
    </div>
  </div>
  <div class="footer">Last updated: 2026-03-20</div>
  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.edm-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.querySelector('.edm-panel[data-lang="' + tab.dataset.lang + '"]').classList.add('active');
      });
    });
  </script>
</body>
</html>
